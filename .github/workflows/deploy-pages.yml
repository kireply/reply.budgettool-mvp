name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build

      # Hard-fail if the single-file build didn't apply: the privately published
      # Pages proxy mislabels external module scripts, so dist/index.html must
      # not reference any.
      - name: Verify single-file output
        run: |
          ls -la dist
          if grep -q 'script type="module" src=' dist/index.html; then
            echo "::error::index.html still references external module scripts — single-file inlining did not run"
            exit 1
          fi
          echo "OK: index.html is self-contained ($(stat -c%s dist/index.html) bytes)"

      # SPA fallback: GitHub Pages serves 404.html for unknown paths,
      # so deep links like /wbs/new resolve through React Router
      - run: cp dist/index.html dist/404.html

      # Pages must be enabled once manually (Settings → Pages → Source: GitHub Actions);
      # the workflow token lacks admin rights to create the site itself.
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
